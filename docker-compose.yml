services:
  plant-bot:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "${PWA_VITE_API_BASE_URL:-}"
        VITE_TELEGRAM_BOT_USERNAME: "${PWA_VITE_TELEGRAM_BOT_USERNAME:-}"
        VITE_PWA_URL: "${PWA_VITE_PWA_URL:-}"
        VITE_BASE_PATH: "${PWA_VITE_BASE_PATH:-/pwa/}"
    image: ghcr.io/pronin-ni/plant-bot:latest
    container_name: plant-bot
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    environment:
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_BOT_USERNAME: "${TELEGRAM_BOT_USERNAME}"
      TELEGRAM_BOT_ENABLED: "${TELEGRAM_BOT_ENABLED:-true}"
      APP_FEATURE_MINI_APP_ENABLED: "${APP_FEATURE_MINI_APP_ENABLED:-true}"
      APP_FEATURE_PWA_ENABLED: "${APP_FEATURE_PWA_ENABLED:-true}"
      SPRING_DATASOURCE_URL: "${SPRING_DATASOURCE_URL:-jdbc:sqlite:./data/plantbot.db?busy_timeout=10000&journal_mode=WAL&synchronous=NORMAL}"
      DB_POOL_MAX_SIZE: "${DB_POOL_MAX_SIZE:-1}"
      DB_POOL_MIN_IDLE: "${DB_POOL_MIN_IDLE:-1}"
      DB_CONNECTION_TIMEOUT_MS: "${DB_CONNECTION_TIMEOUT_MS:-30000}"
      BOT_UPDATE_THREADS: "${BOT_UPDATE_THREADS:-4}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
      OPENROUTER_MODEL: "${OPENROUTER_MODEL}"
      OPENROUTER_MODEL_PLANT: "${OPENROUTER_MODEL_PLANT}"
      OPENROUTER_MODEL_PHOTO_IDENTIFY: "${OPENROUTER_MODEL_PHOTO_IDENTIFY}"
      OPENROUTER_MODEL_PHOTO_DIAGNOSE: "${OPENROUTER_MODEL_PHOTO_DIAGNOSE}"
      OPENROUTER_MODEL_CHAT: "${OPENROUTER_MODEL_CHAT}"
      OPENROUTER_CARE_CACHE_TTL_MINUTES: "${OPENROUTER_CARE_CACHE_TTL_MINUTES:-10080}"
      OPENROUTER_WATERING_CACHE_TTL_MINUTES: "${OPENROUTER_WATERING_CACHE_TTL_MINUTES:-720}"
      OPENROUTER_CHAT_CACHE_TTL_MINUTES: "${OPENROUTER_CHAT_CACHE_TTL_MINUTES:-10080}"
      OPENWEATHER_API_KEY: "${OPENWEATHER_API_KEY}"
      PERENUAL_API_KEY: "${PERENUAL_API_KEY}"
      RESEND_API_KEY: "${RESEND_API_KEY}"
      RESEND_FROM_EMAIL: "${RESEND_FROM_EMAIL:-resend-default@resend.dev}"
      RESEND_DOMAIN_NAME: "${RESEND_DOMAIN_NAME:-}"
      RESEND_FROM_LOCAL_PART: "${RESEND_FROM_LOCAL_PART:-no-reply}"
      RESEND_AUTO_FROM_ENABLED: "${RESEND_AUTO_FROM_ENABLED:-true}"
      RESEND_AUTO_FROM_CACHE_SECONDS: "${RESEND_AUTO_FROM_CACHE_SECONDS:-600}"
      APP_FRONTEND_URL: "${APP_FRONTEND_URL:-http://localhost:5173/pwa}"
      APP_MAGIC_LINK_EXPIRY_MINUTES: "${APP_MAGIC_LINK_EXPIRY_MINUTES:-20}"
      APP_MAGIC_LINK_REQUIRE_HTTPS: "${APP_MAGIC_LINK_REQUIRE_HTTPS:-true}"
      APP_MAGIC_LINK_ALLOW_INSECURE_LOCALHOST: "${APP_MAGIC_LINK_ALLOW_INSECURE_LOCALHOST:-true}"
      APP_MAGIC_LINK_PERSIST_EMAIL_IDENTITY: "${APP_MAGIC_LINK_PERSIST_EMAIL_IDENTITY:-false}"
      TELEGRAM_AUTH_MAX_AGE_SECONDS: "${TELEGRAM_AUTH_MAX_AGE_SECONDS:-86400}"
      APP_DEV_AUTH_ENABLED: "${APP_DEV_AUTH_ENABLED:-false}"
      APP_DEV_TELEGRAM_ID: "${APP_DEV_TELEGRAM_ID:-999000111}"
      APP_DEV_USERNAME: "${APP_DEV_USERNAME:-dev_user}"
      WEB_CORS_ALLOWED_ORIGINS: "${WEB_CORS_ALLOWED_ORIGINS:-*}"
      APP_PUBLIC_BASE_URL: "${APP_PUBLIC_BASE_URL:-http://localhost:8080}"
      HTTP_CLIENT_CONNECT_TIMEOUT_MS: "${HTTP_CLIENT_CONNECT_TIMEOUT_MS:-5000}"
      HTTP_CLIENT_READ_TIMEOUT_MS: "${HTTP_CLIENT_READ_TIMEOUT_MS:-15000}"
      TZ: "Europe/Moscow"
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - plantbot-data:/app/data


  plant-miniapp:
    profiles: ["miniapp-only"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "${PWA_VITE_API_BASE_URL:-}"
        VITE_TELEGRAM_BOT_USERNAME: "${PWA_VITE_TELEGRAM_BOT_USERNAME:-}"
        VITE_PWA_URL: "${PWA_VITE_PWA_URL:-}"
        VITE_BASE_PATH: "${PWA_VITE_BASE_PATH:-/pwa/}"
    image: ghcr.io/pronin-ni/plant-bot:latest
    container_name: plant-miniapp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    environment:
      TELEGRAM_BOT_ENABLED: "false"
      APP_FEATURE_MINI_APP_ENABLED: "${APP_FEATURE_MINI_APP_ENABLED:-true}"
      APP_FEATURE_PWA_ENABLED: "${APP_FEATURE_PWA_ENABLED:-true}"
      SPRING_DATASOURCE_URL: "${SPRING_DATASOURCE_URL:-jdbc:sqlite:./data/plantbot.db?busy_timeout=10000&journal_mode=WAL&synchronous=NORMAL}"
      DB_POOL_MAX_SIZE: "${DB_POOL_MAX_SIZE:-1}"
      DB_POOL_MIN_IDLE: "${DB_POOL_MIN_IDLE:-1}"
      DB_CONNECTION_TIMEOUT_MS: "${DB_CONNECTION_TIMEOUT_MS:-30000}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
      OPENROUTER_MODEL: "${OPENROUTER_MODEL}"
      OPENROUTER_MODEL_PLANT: "${OPENROUTER_MODEL_PLANT}"
      OPENROUTER_MODEL_PHOTO_IDENTIFY: "${OPENROUTER_MODEL_PHOTO_IDENTIFY}"
      OPENROUTER_MODEL_PHOTO_DIAGNOSE: "${OPENROUTER_MODEL_PHOTO_DIAGNOSE}"
      OPENROUTER_MODEL_CHAT: "${OPENROUTER_MODEL_CHAT}"
      OPENROUTER_CARE_CACHE_TTL_MINUTES: "${OPENROUTER_CARE_CACHE_TTL_MINUTES:-10080}"
      OPENROUTER_WATERING_CACHE_TTL_MINUTES: "${OPENROUTER_WATERING_CACHE_TTL_MINUTES:-720}"
      OPENROUTER_CHAT_CACHE_TTL_MINUTES: "${OPENROUTER_CHAT_CACHE_TTL_MINUTES:-10080}"
      OPENWEATHER_API_KEY: "${OPENWEATHER_API_KEY}"
      PERENUAL_API_KEY: "${PERENUAL_API_KEY}"
      RESEND_API_KEY: "${RESEND_API_KEY}"
      RESEND_FROM_EMAIL: "${RESEND_FROM_EMAIL:-resend-default@resend.dev}"
      RESEND_DOMAIN_NAME: "${RESEND_DOMAIN_NAME:-}"
      RESEND_FROM_LOCAL_PART: "${RESEND_FROM_LOCAL_PART:-no-reply}"
      RESEND_AUTO_FROM_ENABLED: "${RESEND_AUTO_FROM_ENABLED:-true}"
      RESEND_AUTO_FROM_CACHE_SECONDS: "${RESEND_AUTO_FROM_CACHE_SECONDS:-600}"
      APP_FRONTEND_URL: "${APP_FRONTEND_URL:-http://localhost:5173/pwa}"
      APP_MAGIC_LINK_EXPIRY_MINUTES: "${APP_MAGIC_LINK_EXPIRY_MINUTES:-20}"
      APP_MAGIC_LINK_REQUIRE_HTTPS: "${APP_MAGIC_LINK_REQUIRE_HTTPS:-true}"
      APP_MAGIC_LINK_ALLOW_INSECURE_LOCALHOST: "${APP_MAGIC_LINK_ALLOW_INSECURE_LOCALHOST:-true}"
      APP_MAGIC_LINK_PERSIST_EMAIL_IDENTITY: "${APP_MAGIC_LINK_PERSIST_EMAIL_IDENTITY:-false}"
      TELEGRAM_AUTH_MAX_AGE_SECONDS: "${TELEGRAM_AUTH_MAX_AGE_SECONDS:-86400}"
      APP_DEV_AUTH_ENABLED: "${APP_DEV_AUTH_ENABLED:-false}"
      APP_DEV_TELEGRAM_ID: "${APP_DEV_TELEGRAM_ID:-999000111}"
      APP_DEV_USERNAME: "${APP_DEV_USERNAME:-dev_user}"
      WEB_CORS_ALLOWED_ORIGINS: "${WEB_CORS_ALLOWED_ORIGINS:-*}"
      APP_PUBLIC_BASE_URL: "${APP_PUBLIC_BASE_URL:-http://localhost:8080}"
      HTTP_CLIENT_CONNECT_TIMEOUT_MS: "${HTTP_CLIENT_CONNECT_TIMEOUT_MS:-5000}"
      HTTP_CLIENT_READ_TIMEOUT_MS: "${HTTP_CLIENT_READ_TIMEOUT_MS:-15000}"
      TZ: "Europe/Moscow"
    ports:
      - "${MINIAPP_PORT:-8080}:8080"
    volumes:
      - plantbot-data:/app/data

volumes:
  plantbot-data:
