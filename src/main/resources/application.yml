spring:
  application:
    name: ${SPRING_APPLICATION_NAME:plant-care-backend}
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:sqlite:./data/plantbot.db?busy_timeout=10000&journal_mode=WAL&synchronous=NORMAL}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:4}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: false
        generate_statistics: ${APP_DB_HIBERNATE_STATS:false}
        session:
          events:
            log:
              LOG_QUERIES_SLOWER_THAN_MS: ${APP_DB_SLOW_QUERY_MS:250}
    open-in-view: false
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

openrouter:
  api-key: ${OPENROUTER_API_KEY:}
  local-key-path: ./data/openrouter-master.key
  model: ${OPENROUTER_MODEL:}
  model-plant: ${OPENROUTER_MODEL_PLANT:}
  model-photo-identify: ${OPENROUTER_MODEL_PHOTO_IDENTIFY:}
  model-photo-diagnose: ${OPENROUTER_MODEL_PHOTO_DIAGNOSE:}
  model-chat: ${OPENROUTER_MODEL_CHAT:}
  base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1/chat/completions}
  models-url: ${OPENROUTER_MODELS_URL:https://openrouter.ai/api/v1/models}
  site-url: ${OPENROUTER_SITE_URL:}
  app-name: ${OPENROUTER_APP_NAME:plant-bot}
  care-cache-ttl-minutes: ${OPENROUTER_CARE_CACHE_TTL_MINUTES:10080}
  watering-cache-ttl-minutes: ${OPENROUTER_WATERING_CACHE_TTL_MINUTES:720}
  chat-cache-ttl-minutes: ${OPENROUTER_CHAT_CACHE_TTL_MINUTES:10080}
  cache-max-entries: ${OPENROUTER_CACHE_MAX_ENTRIES:5000}
  chat-fallback-enabled: ${OPENROUTER_CHAT_FALLBACK_ENABLED:true}
  backoff-minutes: 60
  availability:
    scheduler-delay-ms: ${OPENROUTER_AVAILABILITY_SCHEDULER_DELAY_MS:60000}
    notification-cooldown-minutes: ${OPENROUTER_AVAILABILITY_NOTIFICATION_COOLDOWN_MINUTES:360}
  resilience:
    max-concurrent-requests: ${OPENROUTER_RESILIENCE_MAX_CONCURRENT_REQUESTS:8}
    acquire-timeout-ms: ${OPENROUTER_RESILIENCE_ACQUIRE_TIMEOUT_MS:250}
    circuit-breaker-failure-threshold: ${OPENROUTER_RESILIENCE_CIRCUIT_BREAKER_FAILURE_THRESHOLD:5}
    circuit-breaker-open-seconds: ${OPENROUTER_RESILIENCE_CIRCUIT_BREAKER_OPEN_SECONDS:90}
    request-timeout-ms: ${OPENROUTER_RESILIENCE_REQUEST_TIMEOUT_MS:15000}
    retry-count: ${OPENROUTER_RESILIENCE_RETRY_COUNT:2}
    retry-base-delay-ms: ${OPENROUTER_RESILIENCE_RETRY_BASE_DELAY_MS:600}
    retry-max-delay-ms: ${OPENROUTER_RESILIENCE_RETRY_MAX_DELAY_MS:4000}
    degraded-failure-threshold: ${OPENROUTER_RESILIENCE_DEGRADED_FAILURE_THRESHOLD:2}
    unavailable-failure-threshold: ${OPENROUTER_RESILIENCE_UNAVAILABLE_FAILURE_THRESHOLD:4}
    unavailable-cooldown-minutes: ${OPENROUTER_RESILIENCE_UNAVAILABLE_COOLDOWN_MINUTES:15}
    recovery-recheck-interval-minutes: ${OPENROUTER_RESILIENCE_RECOVERY_RECHECK_INTERVAL_MINUTES:5}
    health-checks-enabled: ${OPENROUTER_RESILIENCE_HEALTH_CHECKS_ENABLED:true}

openai:
  api-key: ${OPENAI_API_KEY:}
  base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1/chat/completions}
  model-text: ${OPENAI_MODEL_TEXT:gpt-4o-mini}
  model-vision: ${OPENAI_MODEL_VISION:gpt-4o-mini}
  request-timeout-ms: ${OPENAI_REQUEST_TIMEOUT_MS:15000}
  retry-count: ${OPENAI_RETRY_COUNT:2}
  retry-base-delay-ms: ${OPENAI_RETRY_BASE_DELAY_MS:600}
  retry-max-delay-ms: ${OPENAI_RETRY_MAX_DELAY_MS:4000}

openmeteo:
  enabled: ${OPENMETEO_ENABLED:true}
  base-url: ${OPENMETEO_BASE_URL:https://api.open-meteo.com/v1/forecast}
  geocode-base-url: ${OPENMETEO_GEOCODE_BASE_URL:https://geocoding-api.open-meteo.com/v1/search}
  geocode-reverse-base-url: ${OPENMETEO_GEOCODE_REVERSE_BASE_URL:https://geocoding-api.open-meteo.com/v1/reverse}

weather:
  provider:
    strategy: ${WEATHER_PROVIDER_STRATEGY:AUTO}
    fixed: ${WEATHER_FIXED_PROVIDER:}
    enabled: ${WEATHER_PROVIDERS_ENABLED:OPEN_METEO,MET_NORWAY}
    timeout-ms: ${WEATHER_PROVIDER_TIMEOUT_MS:5000}
    cache-ttl-minutes: ${WEATHER_PROVIDER_CACHE_TTL_MINUTES:15}
    max-stale-hours: ${WEATHER_PROVIDER_MAX_STALE_HOURS:3}
  provider-strategy: ${WEATHER_PROVIDER_STRATEGY:AUTO}
  fixed-provider: ${WEATHER_FIXED_PROVIDER:OPEN_METEO}
  enabled-providers: ${WEATHER_ENABLED_PROVIDERS:OPEN_METEO,MET_NORWAY}
  timeout-ms: ${WEATHER_TIMEOUT_MS:5000}
  cache-ttl-minutes: ${WEATHER_CACHE_TTL_MINUTES:15}
  stale-fallback-enabled: ${WEATHER_STALE_FALLBACK_ENABLED:true}
  max-stale-age-minutes: ${WEATHER_MAX_STALE_AGE_MINUTES:180}
  metno:
    base-url: ${WEATHER_METNO_BASE_URL:https://api.met.no/weatherapi/locationforecast/2.0/compact}
    user-agent: "${WEATHER_METNO_USER_AGENT:PlantBot/1.0 (contact: plant-bot@example.com)}"
  weatherapi:
    api-key: ${WEATHER_WEATHERAPI_API_KEY:}
    current-url: ${WEATHER_WEATHERAPI_CURRENT_URL:https://api.weatherapi.com/v1/current.json}
    forecast-url: ${WEATHER_WEATHERAPI_FORECAST_URL:https://api.weatherapi.com/v1/forecast.json}
  tomorrow:
    api-key: ${WEATHER_TOMORROW_API_KEY:}
    realtime-url: ${WEATHER_TOMORROW_REALTIME_URL:https://api.tomorrow.io/v4/weather/realtime}
    forecast-url: ${WEATHER_TOMORROW_FORECAST_URL:https://api.tomorrow.io/v4/weather/forecast}

openweather:
  api-key: ${OPENWEATHER_API_KEY:}
  base-url: https://api.openweathermap.org/data/2.5/weather
  geo-base-url: https://api.openweathermap.org/geo/1.0/direct
  geo-reverse-base-url: https://api.openweathermap.org/geo/1.0/reverse
  units: metric
  cache-ttl-minutes: 15
  cache-max-entries: ${OPENWEATHER_CACHE_MAX_ENTRIES:500}
  rain-max-keys: ${OPENWEATHER_RAIN_MAX_KEYS:500}

perenual:
  api-key: ${PERENUAL_API_KEY:}
  base-url: https://perenual.com/api
  cache-ttl-minutes: 10080

translate:
  base-url: https://api.mymemory.translated.net/get

inaturalist:
  base-url: https://api.inaturalist.org/v1

gbif:
  base-url: https://api.gbif.org/v1

http:
  client:
    connect-timeout-ms: ${HTTP_CLIENT_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${HTTP_CLIENT_READ_TIMEOUT_MS:15000}

scheduler:
  daily-cron: "0 0 9 * * *"

telegram:
  auth:
    token: ${TELEGRAM_AUTH_TOKEN:${TELEGRAM_BOT_TOKEN:}}
    max-age-seconds: ${TELEGRAM_AUTH_MAX_AGE_SECONDS:86400}

web:
  cors:
    allowed-origins: ${WEB_CORS_ALLOWED_ORIGINS:*}

app:
  name: ${APP_NAME:Мои Растения}
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173/pwa}
  magic-link:
    expiry-minutes: ${APP_MAGIC_LINK_EXPIRY_MINUTES:20}
    require-https: ${APP_MAGIC_LINK_REQUIRE_HTTPS:true}
    allow-insecure-localhost: ${APP_MAGIC_LINK_ALLOW_INSECURE_LOCALHOST:true}
    cleanup-cron: ${APP_MAGIC_LINK_CLEANUP_CRON:0 */10 * * * *}
    cleanup-used-retention-minutes: ${APP_MAGIC_LINK_CLEANUP_USED_RETENTION_MINUTES:30}
    persist-email-identity: ${APP_MAGIC_LINK_PERSIST_EMAIL_IDENTITY:false}
    audit-retention-days: ${APP_MAGIC_LINK_AUDIT_RETENTION_DAYS:30}
    audit-cleanup-cron: ${APP_MAGIC_LINK_AUDIT_CLEANUP_CRON:0 15 4 * * *}
    rate-limit:
      max-requests: ${APP_MAGIC_LINK_RATE_LIMIT_MAX_REQUESTS:5}
      window-seconds: ${APP_MAGIC_LINK_RATE_LIMIT_WINDOW_SECONDS:60}
    verify-rate-limit:
      max-requests: ${APP_MAGIC_LINK_VERIFY_RATE_LIMIT_MAX_REQUESTS:20}
      window-seconds: ${APP_MAGIC_LINK_VERIFY_RATE_LIMIT_WINDOW_SECONDS:60}
  features:
    pwa-enabled: ${APP_FEATURE_PWA_ENABLED:true}
  backup:
    enabled: ${APP_BACKUP_ENABLED:true}
    cron: ${APP_BACKUP_CRON:0 10 3 * * *}
    zone: ${APP_BACKUP_ZONE:Europe/Moscow}
    path: ${APP_BACKUP_PATH:./data/backups}
    retention-days: ${APP_BACKUP_RETENTION_DAYS:7}
    file-prefix: ${APP_BACKUP_FILE_PREFIX:plantbot-backup}
  security:
    jwt:
      secret: ${APP_SECURITY_JWT_SECRET:change-me-change-me-change-me-change-me}
      ttl-seconds: ${APP_SECURITY_JWT_TTL_SECONDS:2592000}
      issuer: ${APP_SECURITY_JWT_ISSUER:plant-care}
  admin:
    telegram-id: ${APP_ADMIN_TELEGRAM_ID:0}
    rate-limit:
      max-requests: ${APP_ADMIN_RATE_LIMIT_MAX_REQUESTS:120}
      window-seconds: ${APP_ADMIN_RATE_LIMIT_WINDOW_SECONDS:60}
  public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:8080}
  pwa-public-url: ${APP_PWA_PUBLIC_URL:${APP_PUBLIC_BASE_URL:http://localhost:8080}/pwa/}
  learning:
    last-n: 5
    alpha: 0.5
  dictionary:
    aggregate-cron: ${APP_DICTIONARY_AGGREGATE_CRON:0 20 */6 * * *}
    merge-cron: ${APP_DICTIONARY_MERGE_CRON:0 35 4 * * *}
    min-usage-for-dynamic: ${APP_DICTIONARY_MIN_USAGE_DYNAMIC:2}
    min-usage-for-merge: ${APP_DICTIONARY_MIN_USAGE_MERGE:3}
    max-merge-candidates-per-run: ${APP_DICTIONARY_MAX_MERGE_CANDIDATES:50}
    merge-batch-size: ${APP_DICTIONARY_MERGE_BATCH_SIZE:20}
    merge-max-attempts: ${APP_DICTIONARY_MERGE_MAX_ATTEMPTS:30}
  observability:
    slow-request-ms: ${APP_OBSERVABILITY_SLOW_REQUEST_MS:800}
  dev-auth-enabled: ${APP_DEV_AUTH_ENABLED:false}
  dev-telegram-id: ${APP_DEV_TELEGRAM_ID:999000111}
  dev-username: ${APP_DEV_USERNAME:dev_user}
  sensor-context:
    provider: ${APP_SENSOR_CONTEXT_PROVIDER:NONE}

resend:
  api-key: ${RESEND_API_KEY:}
  from-email: ${RESEND_FROM_EMAIL:resend-default@resend.dev}
  domain-name: ${RESEND_DOMAIN_NAME:}
  from-local-part: ${RESEND_FROM_LOCAL_PART:no-reply}
  auto-from-enabled: ${RESEND_AUTO_FROM_ENABLED:true}
  auto-from-cache-seconds: ${RESEND_AUTO_FROM_CACHE_SECONDS:600}
  base-url: ${RESEND_BASE_URL:https://api.resend.com}

web-push:
  enabled: ${WEB_PUSH_ENABLED:false}
  subject: ${WEB_PUSH_SUBJECT:mailto:plant-bot@example.com}
  vapid:
    public-key: ${WEB_PUSH_VAPID_PUBLIC_KEY:}
    private-key: ${WEB_PUSH_VAPID_PRIVATE_KEY:}

home-assistant:
  local-key-path: ./data/ha-master.key
  http-timeout-ms: 10000
  retry-count: 3
  poll-random-offset-max-seconds: 300

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,threaddump
  metrics:
    distribution:
      percentiles-histogram:
        plantbot.http.server.requests: true
        plantbot.external.calls: true
        plantbot.scheduler.runs: true

logging:
  level:
    com.example.plantbot: INFO
    org.telegram.telegrambots: WARN
